name: Safe CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: safe-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, build and app typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
      SESSION_SECRET: ci-only-placeholder-not-for-production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Lint
        run: npm run lint
      - name: Build without production data
        run: npm run build
      - name: Typecheck production app
        run: npx tsc --noEmit --project tsconfig.ci.json
